<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPROLUX — Sistema de Gestión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141716;
    --surface2: #1c1f1d;
    --border: #2a2e2c;
    --accent: #b8f04a;
    --accent2: #4af0a0;
    --text: #e8ede9;
    --muted: #6b766d;
    --danger: #f04a4a;
    --warn: #f0c44a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  .logo span {
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
    margin-left: 8px;
    font-family: 'DM Sans', sans-serif;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .stat-pill strong {
    color: var(--accent);
    font-weight: 500;
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(184, 240, 74, 0.06);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 800px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .msg.user .avatar { background: var(--accent); color: var(--bg); }
  .msg.bot .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 44px);
  }

  .msg.user .bubble {
    background: var(--surface2);
    border-color: var(--border);
  }

  .bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .bubble table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
  }

  .bubble table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(42,46,44,0.5);
  }

  .bubble table tr:last-child td { border-bottom: none; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .tag.green { background: rgba(74, 240, 160, 0.12); color: var(--accent2); border: 1px solid rgba(74, 240, 160, 0.25); }
  .tag.red { background: rgba(240, 74, 74, 0.12); color: var(--danger); border: 1px solid rgba(240, 74, 74, 0.25); }
  .tag.yellow { background: rgba(240, 196, 74, 0.12); color: var(--warn); border: 1px solid rgba(240, 196, 74, 0.25); }
  .tag.accent { background: rgba(184, 240, 74, 0.12); color: var(--accent); border: 1px solid rgba(184, 240, 74, 0.25); }

  .num-pos { color: var(--accent2); font-family: 'DM Mono', monospace; }
  .num-neg { color: var(--danger); font-family: 'DM Mono', monospace; }
  .num { font-family: 'DM Mono', monospace; }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin: 10px 0;
  }

  .kpi {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .kpi-value { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent); font-weight: 500; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .bar-chart {
    margin: 10px 0;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
  }

  .bar-label { width: 200px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
  .bar-val { width: 80px; text-align: right; color: var(--text); font-family: 'DM Mono', monospace; flex-shrink: 0; }

  .thinking {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-row {
    display: flex;
    gap: 10px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  input[type=text] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  button.send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  button.send:hover { opacity: 0.85; }
  button.send:disabled { opacity: 0.4; cursor: not-allowed; }

  p { margin-bottom: 8px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--muted); font-style: italic; }
</style>
</head>

// ==================== GOOGLE SHEETS LIVE DATA ====================
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsTZyA4wK5x1B3KLPlOnnRBKzYmcfRrrI6kQR1b7Bk9Sw91vN1Jt2tG7W2V7_MK6EprBC6rSEKH7GE/pub?gid=0&single=true&output=csv';

let newTransactions = [];
let lastLoaded = null;
let loadStatus = 'idle'; // idle | loading | ok | error

async function loadSheetTransactions() {
  loadStatus = 'loading';
  updateSheetIndicator();
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const csv = await res.text();
    const rows = csv.trim().split('\n').slice(1);
    newTransactions = rows.map(row => {
      const cols = row.split(',').map(v => v.replace(/"/g,'').trim());
      const [fecha, concepto, detalle, ingreso, egreso, fuente] = cols;
      if (!fecha || !concepto) return null;
      const d = new Date(fecha);
      return {
        fecha,
        mes: isNaN(d) ? null : d.getMonth() + 1,
        anio: isNaN(d) ? null : d.getFullYear(),
        detalle: detalle || '',
        concepto: concepto || '',
        ingreso: parseFloat(ingreso) || 0,
        egreso: parseFloat(egreso) || 0,
        fuente: fuente || 'whatsapp'
      };
    }).filter(t => t !== null);
    lastLoaded = new Date();
    loadStatus = 'ok';
  } catch(e) {
    loadStatus = 'error';
    newTransactions = [];
  }
  updateSheetIndicator();
}

function updateSheetIndicator() {
  const el = document.getElementById('sheet-status');
  if (!el) return;
  if (loadStatus === 'loading') {
    el.innerHTML = '<span style="color:var(--warn)">● Actualizando...</span>';
  } else if (loadStatus === 'ok') {
    const time = lastLoaded ? lastLoaded.toLocaleTimeString('es-UY', {hour:'2-digit',minute:'2-digit'}) : '';
    el.innerHTML = `<span style="color:var(--accent2)">● ${newTransactions.length} movimientos nuevos · ${time}</span>`;
  } else if (loadStatus === 'error') {
    el.innerHTML = '<span style="color:var(--danger)">● Sin conexión a Sheets</span>';
  }
}

// ==================== UTILIDADES ====================
const fmt = n => '$' + parseFloat(n).toLocaleString('es-UY', {minimumFractionDigits:0,maximumFractionDigits:0});
const fmtN = n => parseFloat(n).toLocaleString('es-UY', {minimumFractionDigits:0,maximumFractionDigits:0});
const MESES = {1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};

function buildContext() {
  // Combinar datos históricos con nuevos de Sheets
  const allTransactions = [...DATA.transactions, ...newTransactions];
  // Resumen por año
  const byYear = {};
  allTransactions.forEach(t => {
    const y = t.anio;
    if (!y) return;
    if (!byYear[y]) byYear[y] = { ingresos:0, egresos:0 };
    byYear[y].ingresos += t.ingreso || 0;
    byYear[y].egresos += t.egreso || 0;
  });

  // Ventas totales
  const totalVentas = DATA.facturacion.reduce((s,f) => s + f.total, 0);
  const totalAnimales = DATA.facturacion.reduce((s,f) => s + f.cantidad, 0);

  // Pendientes banco
  const pendientes = DATA.bancos.filter(b => !b.pagado || b.pagado === '');
  const totalPendiente = pendientes.reduce((s,b) => s + b.valor, 0);

  // Inversores activos
  const inversoresActivos = DATA.inversores.filter(i =>
    !['WIEDEMAN','ROTH VILMA','MARY SEEHOUS','MARIANO REMONDINO'].includes(i.inversor)
  );

  return {
    byYear, totalVentas, totalAnimales, pendientes, totalPendiente,
    inversoresActivos,
    flujo: DATA.flujo_historico,
    facturacion: DATA.facturacion,
    transactions: DATA.transactions,
    inversores: DATA.inversores,
    bancos: DATA.bancos
  };
}
